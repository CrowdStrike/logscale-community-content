    text: "## Want to get certified in CrowdStrike's Next-Gen SIEM?\n\n### [CrowdStrike\
      \ Certified **SIEM Engineer** (CCSE)](https://university.crowdstrike.com/pages/51/certification-siem-engineer)\
      \ - [Exam Guide](https://assets.crowdstrike.com/is/content/crowdstrikeinc/ccse-certification-exam-guidepdf)\
      \  \nTest your knowledge with the [**CCSE** Practice Exam](https://university.crowdstrike.com/learn/courses/1623/crowdstrike-certified-siem-engineer-practice-exam)\
      \  \n  \n**ELEARNING COURSES**\n- [**CQL 101**: CrowdStrike Query Language Fundamentals\
      \ 1](https://university.crowdstrike.com/learn/courses/477/cql-101-crowdstrike-query-language-fundamentals-1)\n\
      - [**CQL 102**: CrowdStrike Query Language Fundamentals 2](https://university.crowdstrike.com/learn/courses/1050/cql-102-crowdstrike-query-language-fundamentals-2)\n\
      - [**FALCON 114**: Falcon Fusion SOAR Fundamentals](https://university.crowdstrike.com/learn/courses/474/falcon-114-falcon-fusion-soar-fundamentals)\n\
      - [**FALCON 115**: Create a Falcon Fusion SOAR Workflow](https://university.crowdstrike.com/learn/courses/475/falcon-115-create-a-falcon-fusion-soar-workflow)\n\
      - [**FALCON 151**: Incident Workbench Fundamentals](https://university.crowdstrike.com/learn/course/1001/falcon-151-incident-workbench-fundamentals)\n\
      - [**SIEM 100**: Next-Gen SIEM Fundamentals](https://university.crowdstrike.com/learn/courses/490/siem-100-next-gen-siem-fundamentals)\n\
      - [**SIEM 105**: Falcon Next-Gen SIEM Architecture and Core Concepts](https://university.crowdstrike.com/learn/course/1577/siem-105-next-gen-siem-architecture-and-core-concepts)\n\
      - [**SIEM 107**: Creating Correlation Rules with Falcon Next-Gen SIEM](https://university.crowdstrike.com/learn/course/1496/siem-107-creating-correlation-rules-with-falcon-next-gen-siem)\n\
      - [**SIEM 108**: Managing Automation Workflows with Fusion SOAR in Next-Gen\
      \ SIEM](https://university.crowdstrike.com/learn/courses/1613/siem-108-managing-automation-workflows-with-fusion-soar-in-next-gen-siem)\n\
      **INSTRUCTOR LED COURSES**  \nⓘ *CSU courses level 200 and above may require\
      \ additional licensing be purchased before you can enroll.*\n- [**CQL 201**:\
      \ Designing, Optimizing, and Modularizing CQL Queries](https://university.crowdstrike.com/learn/course/1450/cql-201-designing-optimizing-and-modularizing-cql-queries)\
      \ (*[Course Syllabus](https://assets.crowdstrike.com/is/content/crowdstrikeinc/csu-cql-201-course-syllabuspdf)*)\n\
