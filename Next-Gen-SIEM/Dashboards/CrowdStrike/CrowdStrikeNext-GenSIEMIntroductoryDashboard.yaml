  75935dc3-6121-4859-a708-d3774e857fd2:
    x: 8
    y: 15
    description: This widget is shows the same data as the ipLocation() Example, but
      also uses Falcon Helper to make the country names easier to read using their
      full names instead of country codes.
    height: 4
    queryString: |
      createEvents(["example.destination.ip=57.144.204.1", "example.destination.ip=203.96.236.57", "example.destination.ip=212.119.2.199", "example.destination.ip=1.120.96.248", "example.destination.ip=1.178.32.0"])
      | kvParse()
      | ipLocation(field="example.destination.ip")
      | rename([["example.destination.ip.city", "City"], ["example.destination.ip.country", "IP.country"], ["example.destination.ip.lat", "Lattitude"], ["example.destination.ip.lon", "Longitude"]])
      | $falcon/helper:enrich(field=IP.country)
      | rename(field="IP.country", as="Country")
      | table(["example.destination.ip", "City", "Country", Lattitude, Longitude])
    end: now
    start: 1d
    width: 4
    options:
      cell-overflow: wrap-text
      column-overflow: truncate
      configured-columns: {}
      row-numbers-enabled: false
    visualization: table-view
    title: ipLocation() Example Enriched
    isLive: false
    type: query
