    x: 6
    y: 19
    height: 4
    text: |-
      ### <-- Integrated Threat Intelligence
      CrowdStrike's own threat intelligence is integrated into the Next-Gen SIEM solution. This is accessible through the use of the *ioc:lookup()* function. You can use this to look up IOCs (Indicators of Compromise) of IP addresses, URLs, and domains in a local copy of CrowdStrike's curated database of IOCs and annotate the events with the associated security information.

      [Click here to read more about the parameters available, how to use this function, and what kind of information it is able to return with its results.](https://library.humio.com/data-analysis/functions-ioc-lookup.html)
    width: 3
    title: ''
    type: note
  note-1757000250362-0:
    x: 0
    y: 1
    description: See the "📚 Additional Information" section for links to CQL courses
      and training in CrowdStrike University
    height: 8
    text: "Using the [Advanced event search](/investigate/search) page, you are able\
      \ to quickly and efficiently search through large amounts of data without having\
      \ to wait long periods of time for results. As well, the ability to query that\
      \ data is made to be very approachable to new or less experienced users.\n\n\
      Check out this video tutorial on the use of the Event search and Advanced event\
      \ search pages: [Feature Focus: Next-Gen SIEM - Event Search and Advanced Event\
      \ Search](https://play.vidyard.com/Exm6H5iQna5vmxmSgRSDFy.html)\n- ⓘ *This video\
      \ and many others are accessible within the [CrowdStrike Support Portal's **Video\
      \ Tutorials** section](https://supportportal.crowdstrike.com/s/video-tutorials)*\n\
      \n## Let's start with some basic queries!\n### String searching\nYou can run\
      \ simple string searches to look for that string of characters within any of\
      \ the available logs. Something like an IP address is easily searched for without\
      \ any special functions or field searching needed. You can easily search for\
      \ words within your logs to find things like [error](/investigate/search?end=&query=error&repo=all&searchViewInteractions=NoXSA&start=7d&timezone=UTC),\
      \ [failed](/investigate/search?end=&query=failed&repo=all&searchViewInteractions=NoXSA&start=7d&timezone=UTC),\
      \ or [exception](/investigate/search?end=&query=exception&repo=all&searchViewInteractions=NoXSA&start=7d&timezone=UTC).\
      \  \n### [Click here to search for \"google.com\" within your logs over the\
      \ last 7 days.](/investigate/search?end=&query=google.com&repo=all&searchViewInteractions=NoXSA&start=7d&timezone=UTC)\n\
      ### Using Regex to search\nTo search for words with your logs without worrying\
      \ if any of the letters are uppercase or lowercase, you can use regex to specify\
      \ case-insensitivity. Here's an example:\n```\n/powershell/i\n```\n  \n### [Click\
      \ here to search for any logs containing \"powershell\" using this method over\
      \ the last 7 days.](/investigate/search?end=&query=%2Fpowershell%2Fi&repo=all&searchViewInteractions=NoXSA&start=7d&timezone=UTC)\
      \  \nⓘ *In the Advanced event search page for this, try changing the word \"\
      powershell\" to another word that you want to search for within your logs.*\n\
      \n### Searching based on a specific connector or vendor\nIf you wish to see\
      \ all of the data coming in for a specific connector you have setup, you can\
      \ do this right from [Data Onboarding](/data-connectors/).\n1. When viewing\
      \ your Connections, select the three vertical dots in the **Actions** column\
      \ all the way to the right of the row for the connector you wish to search on.\n\
      2. Click on **Show events** (should be the last option in the list of Actions).\n\
      - This will open a new Advanced event search window searching on all logs for\
      \ the last hour for that connector.\n\nYou can also use the metadata fields\
      \ that are added to logs during the parsing process. Here's an example of what\
      \ this looks like with CrowdStrike data:\n```\n#Vendor = /crowdstrike/i\n```\n\
      ### [Click here to search for CrowdStrike logs using this method.](/investigate/search?end=&query=%23Vendor%20%3D%20%2Fcrowdstrike%2Fi&repo=all&searchViewInteractions=NoXSA&start=7d&timezone=UTC)\n\
      ⓘ *In the Advanced event search page for this, try changing the word \"crowdstrike\"\
      \ to the vendor name of one of the log sources you are currently ingesting.*\
      \  \nⓘ *Note that this search uses the regex case-insensitivity technique described\
      \ earlier. This is not required for this search since the vendor name should\
      \ always be lowercase when added during parsing. However, getting comfortable\
      \ with using this feature can help you when searching in other use cases.*\n\
      \n## 🎉 Congratulations! 🎉\nYou now have the basics for starting to search\
      \ through your data in the CrowdStrike console!\n- The search for the vendor\
      \ name you just did is an example of searching for events mapped to a specific\
      \ field.\n- Feel free to play around in the [Advanced event search](/investigate/search)\
      \ page to look for information mapped to different fields within your logs."
    width: 12
    title: CQL Basics
    type: note
