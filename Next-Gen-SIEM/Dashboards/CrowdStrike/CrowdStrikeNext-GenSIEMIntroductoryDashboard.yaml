  d2d837bf-17b0-4ee8-90cf-f17bc72ec0fc:
    x: 4
    y: 13
    height: 4
    queryString: |-
      createEvents([
       "example=1st_item exampleEvent=1",
       "example=1st_item exampleEvent=1",
       "example=1st_item exampleEvent=1",
       "example=2nd_item exampleEvent=1",
       "example=2nd_item exampleEvent=1",
       "example=3rd_item exampleEvent=1",
       "example=1st_item exampleEvent=2",
       "example=1st_item exampleEvent=2",
       "example=2nd_item exampleEvent=2",
       "example=3rd_item exampleEvent=2",
       "example=3rd_item exampleEvent=2",
       "example=3rd_item exampleEvent=2",
       "example=1st_item exampleEvent=3",
       "example=2nd_item exampleEvent=3",
       "example=2nd_item exampleEvent=3",
       "example=2nd_item exampleEvent=3",
       "example=3rd_item exampleEvent=3",
       "example=3rd_item exampleEvent=3"
      ])
      | kvParse()
      | case {
          exampleEvent = 1 |
          now(as=current_timestamp)
          | new_timestamp := current_timestamp;
          exampleEvent = 2 |
          now(as=current_timestamp)
          | new_timestamp := current_timestamp - 300000;
          exampleEvent = 3 |
          now(as=current_timestamp)
          | new_timestamp := current_timestamp - 600000;
          *;
      }
      | @timestamp := new_timestamp
      | timeChart(span=5min, series=example, function=count())
    end: now
    start: 10m
    width: 4
    options:
      legendTitle: Count
      valueFormat: metric
      xAxisTitle: Time
      colorPalette: monoPeach
      legendLocation: top
      includeHistogram: false
      titleSize: medium
      reversePalette: false
    visualization: heat-map
    title: Heat Map Example
    isLive: false
    type: query
