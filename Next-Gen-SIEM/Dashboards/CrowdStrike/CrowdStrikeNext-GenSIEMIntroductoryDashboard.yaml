            \"Descriptions and Additional Notes\": \"Shows PCI-relevant network activity, including web and application traffic,\nSSL/TLS versions and weak cryptography, insecure protocols, SNMP and SMB\nversions, SSH on non-standard ports, and top IP conversations and ports for\nthe selected time range.\",
