  26e8d809-dfc1-4b68-ad28-1c08e0539641:
    x: 0
    y: 1
    height: 12
    queryString: |-
      createEvents(["example=1st_item",
       "example=2nd_item",
       "example=3rd_item",
       "example=1st_item",
       "example=2nd_item",
       "example=1st_item"])
      | kvParse()
      | groupBy([example])
    end: now
    start: 10m
    width: 4
    options:
      show-min-max: false
      trellisMaxColumns: 1
      labels:
      - label: LOW
        value: 1
      - label: MEDIUM
        value: 2
      - label: HIGH
        value: 3
      padding: 0
      trellisShowBorders: true
      gaugeType: radialNeedle
      thresholdConfig:
        palette: Green yellow red
        reversePalette: true
        thresholds:
        - value: 1
        - value: 2
        - value: 3
      range-max: 4
    visualization: gauge
    title: Gauge Example
    isLive: false
    type: query
  note-1756992852414-0:
    x: 4
    y: 0
    height: 4
    text: "Alerting is an important part of monitoring an organization's security.\
      \ Historically, SIEM solutions have made this a difficult experience; often\
      \ creating so many alerts that responders experience \"alert fatigue\". This\
      \ can cause the important events to be overlooked amongst the rest of the alerts\
      \ that they may feel aren't as severe.\n\nCrowdStrike allows for granular customization\
      \ of alerting, as well as the capability to automate tasks and decide when an\
      \ action should/shouldn't occur.\n\n### Here are some helpful playbooks to get\
      \ you started with setting up alert notifications using Fusion SOAR:\n\n| Playbook\
      \                                                                          \
      \                                             | Description                \
      \                                                                          \
      \                                                                          \
      \                                                                          \
      \                                                                          \
      \                                      |\n| ------------------------------------------------------------------------------------------------------------------------------\
      \ | ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------\
      \ |\n| [Send a notification when a correlation rule based detection is generated](/content-library/details/global:fusion_playbook:f07ade95fc1a4619aa9fe785eb9ec8e5)\
      \    | Sends an email notification when a NG-SIEM Correlation Rule detection\
      \ is generated. You can also replace the 'Send email' action with a different\
      \ notification tool such as Slack or Teams.                                \
      \                                                                          \
      \                                                                    |\n| [Send\
      \ a notification when a third party detection is generated](/content-library/details/global:fusion_playbook:1a4f70f439414d129783f9a9d45c7616)\
      \ | Sends an email notification when a NG-SIEM third party detection is generated.\
      \ Third party detections are pass-through alerts from third party tools such\
      \ as Okta. Customize this workflow with conditions to filter which alerts to\
      \ notify on. You can also replace the 'Send email' action with a different notification\
      \ tool such as Slack or Teams.                  |\n \n***ⓘ There are also many\
      \ Triggers and Actions available for use with Cases within Next-Gen SIEM. For\
      \ example, you can remake either of the above workflows with the Trigger \"\
      CROWDSTRIKE  Case > Case Created\"***\n\n"
    width: 8
    title: Next-Gen SIEM Alerting
    type: note
  846bccf8-6f93-463c-b341-c6016a612f47:
    x: 6
    y: 4
    height: 3
    text: "### “Charlotte AI-LLM Completion” Action\n*Falcon Fusion SOAR*  \n  \n\
      **Activates LLM inference within Falcon Fusion SOAR workflows**  \n  \n[Documentation](https://docs.crowdstrike.com/r/gcb77e1a)"
    width: 3
