    text: |-
      ### [Cases](/xdr/cases)
      You can create a case to investigate one or more detections. Events found with an event query are also able to be added to a case for investigation.
      - Cases can be created with a Case template to allow for SLA setting and notification, and also custom case fields for tracking progress and organizational metrics or information related to case investigation
      - [**Watch this YouTube video showcasing how to streamline investigations using Case Management**](https://www.youtube.com/watch?v=18r7wJftFYA)
      - A brief overview of what is available within cases is available in [release note in the Support Portal](https://supportportal.crowdstrike.com/s/article/Release-Notes-Investigate-Suspicious-Activity-and-Orchestrate-Response-with-Next-Gen-SIEM-Cases)

      ## Create a test case using one or more detections from the Unified Detections page.
      - Check out the **Case Investigation** documentation linked below to see what options you have when investigating events and detections with the workbench.

