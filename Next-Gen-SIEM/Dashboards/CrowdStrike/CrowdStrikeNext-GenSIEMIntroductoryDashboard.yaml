  0536b488-0783-425e-bc4e-6bcad4b7723e:
    x: 0
    y: 4
    description: This widget is borrowed from the "Fusion SOAR Execution" dashboard.
      This displays executions of workflows within your CrowdStrike environment.
    height: 4
    queryString: |-
      #repo=fusion
      // only look for execution summary start event
      | "execution_log_type" = summary AND execution_log_subtype = "start"
      | not "parent_execution_id" = * AND not root_execution_id = *

      | timechart(span=1d, series=trigger.data.Trigger.Category)
    end: now
    start: 7d
    width: 5
    options:
      legendPosition: bottom
      series: {}
      connect-points: false
      stacking: normal
      yAxisScale: linear
      plotType: area
      imputation: none
    visualization: time-chart
    title: Workflow Executions Over Time
    isLive: false
    type: query
  0260e638-ed4f-4f6f-b34a-a38cd4554ae7:
    x: 8
    description: Click the vertical ellipses to the left of each widget name for a
      link to the LogScale documentation for that widget type.
