      Test your knowledge with the [**CCSA** Practice Exam](https://university.crowdstrike.com/learn/courses/2005/crowdstrike-certified-siem-analyst-practice-exam)\
      \  \n  \n**ELEARNING COURSES**\n- [**SIEM 100**: Next-Gen SIEM Fundamentals](https://university.crowdstrike.com/learn/courses/490/siem-100-next-gen-siem-fundamentals)\n\
      - [**SIEM 106**: Case Management Fundamentals](https://university.crowdstrike.com/learn/courses/1762/siem-106-case-management-fundamentals)\n\
