  note-1756242823460-3:
    x: 0
    y: 26
    description: Using the prompt and instruction here, have Charlotte AI develop
      a query that you can use to fix the widget next to this one.
    height: 6
    text: |
      *Charlotte AI can be used to help you build queries to find data relevant to your organization's use cases. These queries can also be made into dashboard widgets for you to regularly monitor this information.*

      ##### Try the following:
      - Prompt Charlotte AI to build a query for this by inputting the following:
      ```
      Create a logscale query that shows destination IP addresses that are on CrowdStrike's IOC list from the last 30 days with a confidence threshold of "unverified". Then, display those IP addresses in a World Map widget.
      ```

      1. Select the "**Run query in Advanced event search**" option to open the query in Advanced event search to visualize the widget with the World Map view
      2. Click "**Save**", then select "**Dashboard widget**" to replace the broken widget on this dashboard.
      3. Select this dashboard from the dropdown list of dashboards
      4. Select "**Charlotte AI - Destination IP addresses**" from the dropdown list of widgets
      5. Click the **Save** button to save the widget with this new query and view
    width: 6
    title: 🌎 Create a World Map widget using Charlotte AI
    type: note
