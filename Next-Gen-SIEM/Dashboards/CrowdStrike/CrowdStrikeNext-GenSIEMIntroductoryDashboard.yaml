    height: 9
    text: "# [Data Onboarding](/data-connectors/)\n**Go to the Data Onboarding page\
      \ to get started ingesting your logs into CrowdStrike!**  \n  \n---\n## Documentation:\n\
      \n- [Set up Falcon Next-Gen SIEM](https://docs.crowdstrike.com/r/cffa5af8) (A\
      \ high-level strategy to getting Next-Gen SIEM up and running with your data\
      \ and security needs)\n- [Data Connectors](https://docs.crowdstrike.com/r/a76b8289)\
      \ (General information on CrowdStrike's data connectors)\n- [Third-party Data\
      \ Sources](https://docs.crowdstrike.com/r/je6a45b3) (Index on the left links\
      \ to documentation for setting up ingestion for third-party solutions)\n- ⓘ\
      \ *Pull connectors generally use an API to configure the data connector to \"\
      pull\" the data into CrowdStrike. Push connectors generally use the LogScale\
      \ collector to \"push\" the logs to the CrowdStrike cloud.*  \n  \n---\n## Support\
      \ Portal:\n\n- [[Index] Next-Gen SIEM Data Connector troubleshooting articles](https://supportportal.crowdstrike.com/s/article/ka1Ns0000001mU1IAI)\
      \ (Troubleshooting information for using the Falcon LogScale Collector (FLC),\
      \ 3rd-party data connectors, and HTTP/HEC data connectors)\n- [Troubleshooting\
      \ Sensor-managed Falcon LogScale Collector Installations](https://supportportal.crowdstrike.com/s/article/Troubleshooting-Sensor-managed-Falcon-LogScale-Collector-Installations)\
      \ (Troubleshooting information for when the LogScale collector is managed through\
      \ the LogScale Collector Policies for the Falcon Sensor)\n- [How To Create an\
      \ Effective Support Ticket for Next-Gen SIEM](https://supportportal.crowdstrike.com/s/article/ka1Ns0000005fc1IAA)\
      \ (This will help you effectively request assistance from our Support team when\
      \ creating a ticket for Next-Gen SIEM)  \n  \n---\nⓘ [Click here to view all\
      \ Data Connectors in current CID that are **not in an active state**](/data-connectors/?filter=display_status%3A%27Disconnected%27%2Bdisplay_status%3A%27Error%27%2Bdisplay_status%3A%27Idle%27%2Bdisplay_status%3A%27Paused%27%2Bdisplay_status%3A%27Pending%27&pageSize=100).\n\
      \n*- This link displays connectors with **disconnected**, **error**, **idle**,\
      \ **paused**, or **pending** status that require attention. \nAddressing these\
      \ connector issues is critical for ensuring continuous data ingestion and maintaining\
      \ effective detection coverage through your correlation rules.*\n"
    width: 7
    title: Getting started
    type: note
