      provides.
    height: 5
    text: |-
      Rather than having to turn off tons of rules creating false-positives alerts, CrowdStrike provides rule templates for many supported data sources to help organizations start monitoring logs for security concerns quickly and meaningfully.

      To discover rule templates that align to your data sources, check out the [**CrowdStrike Next-Gen SIEM - Rule Template Discovery**](/investigate/search/custom-dashboards/CrowdStrike%20Next-Gen%20SIEM%20-%20Rule%20Template%20Discovery?repoOrViewName=search-all&packageScope=falcon/ngsiem-content-crt) dashboard.
      - ⓘ *A walkthrough of this dashboard is available on [**YouTube**](https://www.youtube.com/watch?v=9N6m_NErrns)*

      Click [HERE](/xdr/rules/templates) to view all rule templates developed by CrowdStrike. You can select [**Create rule**] to turn the template into an active rule to begin monitoring your data.

