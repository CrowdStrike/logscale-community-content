      \ (*[Course Syllabus](https://assets.crowdstrike.com/is/content/crowdstrikeinc/csu-siem-200-course-syllabuspdf)*)\n\
      - [**SIEM 210**: Onboarding Third-Party Data and Managing Falcon Next-Gen SIEM](https://university.crowdstrike.com/learn/courses/998/siem-210-onboarding-third-party-data-and-managing-falcon-next-gen-siem)\
      \ (*[Course Syllabus](https://assets.crowdstrike.com/is/content/crowdstrikeinc/csu-siem-210-course-syllabuspdf)*)\n\
      - [**SIEM 211**: Incident Response and Investigation with Falcon Next-Gen SIEM](https://university.crowdstrike.com/pages/43/course-catalog?ctl131=t-_elearning_classroom~se-%22SIEM%20211%22)\
      \ (*[Course Syllabus](https://assets.crowdstrike.com/is/content/crowdstrikeinc/csu-siem-211-course-syllabuspdf)*)\n\
      \n---\n### [CrowdStrike Certified **SIEM Analyst** (CCSA)](https://university.crowdstrike.com/pages/67/certification-siem-analyst)\
