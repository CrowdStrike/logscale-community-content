            \"Playbook\": \"[IP Address Enrichment MaxMind](/content-library/details/global:fusion_playbook:1d35c24f455b497dbbc523778d612b66)\",
            \"Description\": \"Enriches IP addresses with detailed geolocation data from\nMaxMind, including connection type, user type, static IP score,\nISP, ASN, and country information. This playbook can be triggered\non-demand from an Next-Gen SIEM Case or integrated into other\nautomated playbooks to perform enrichment when provided a detection\nID and the relevant entity (such as IP addresses, domains, URLs, or\nfile hashes).\",
            \"enrichment_type\": \"ip_address\",
            \"Application\": \"MaxMind\"
          }
        }",
        "{
          \"Workflow\": {
            \"Playbook\": \"[IP Address Enrichment AbuseIPDB](/content-library/details/global:fusion_playbook:a7b373be38244bf6b5a974e0c5a6c906)\",
            \"Description\": \"Enriches IP addresses with threat intelligence from AbuseIPDB,\ngathering reputation data, network block information, and abuse\nreports to provide comprehensive context for security\ninvestigations. This playbook can be triggered on-demand from an\nNext-Gen SIEM Case or integrated into other automated playbooks to\nperform enrichment when provided a detection ID and the relevant\nentity (such as IP addresses, domains, URLs, or file hashes).\",
            \"enrichment_type\": \"ip_address\",
            \"Application\": \"AbuseIPDB\"
          }
        }",
        "{
          \"Workflow\": {
            \"Playbook\": \"[IP Address Enrichment Pulsedive](/content-library/details/global:fusion_playbook:829da7c6dccc4173aa0fa69978458802)\",
            \"Description\": \"Enriches IP addresses with threat intelligence data from\nPulsedive, including risk assessment, threat associations, and\nrelated indicators, then adds comprehensive comments and tags to\nNext-Gen SIEM cases and detections. This playbook can be triggered\non-demand from a Next-Gen SIEM Case or integrated into other\nautomated playbooks to perform enrichment when provided a detection\nID and the relevant entity (such as IP addresses, domains, URLs, or\nfile hashes).\",
            \"enrichment_type\": \"ip_address\",
            \"Application\": \"Pulsedive\"
          }
        }",
        "{
          \"Workflow\": {
            \"Playbook\": \"[IP Address Enrichment CrowdStrike](/content-library/details/global:fusion_playbook:41dc31767b7d4ac28bd6e888e73e6fbb)\",
            \"Description\": \"Enriches IP addresses with CrowdStrike device association data,\ngathering information about endpoints that have communicated with\nthe specified IP address and adding relevant details as comments\nand tags to cases or detections. This playbook can be triggered\non-demand from a Next-Gen SIEM Case or integrated into other\nautomated playbooks to perform enrichment when provided a detection\nID and the relevant entity (such as IP addresses, domains, URLs, or\nfile hashes).\",
            \"enrichment_type\": \"ip_address\",
            \"Application\": \"CrowdStrike\"
          }
        }",
        "{
          \"Workflow\": {
            \"Playbook\": \"[IP Address Enrichment SecurityTrails](/content-library/details/global:fusion_playbook:2b26ebb218284de6afc34e4eac41edf8)\",
            \"Description\": \"Enriches IP addresses with comprehensive threat intelligence\nfrom SecurityTrails, including WHOIS data, neighboring IPs, user\nagents, and statistical insights, then adds the findings as\ncomments and tags to Next-Gen SIEM cases or detections. This\nplaybook can be triggered on-demand from an Next-Gen SIEM Case or\nintegrated into other automated playbooks to perform enrichment when\nprovided a detection ID and the relevant entity (such as IP\naddresses, domains, URLs, or file hashes).\",
            \"enrichment_type\": \"ip_address\",
            \"Application\": \"SecurityTrails\"
          }
        }",
        "{
          \"Workflow\": {
            \"Playbook\": \"[IP Address Enrichment Google Threat Intelligence](/content-library/details/global:fusion_playbook:b21df701c35744e383d8c2ab4279e608)\",
            \"Description\": \"Enriches IP addresses with threat intelligence data from Google\nThreat Intelligence, providing verdict information, threat scores,\nanalysis statistics, reputation data, and geographic details. This\nplaybook can be triggered on-demand from a Next-Gen SIEM Case or\nintegrated into other automated playbooks to perform enrichment when\nprovided a detection ID and the relevant entity (such as IP\naddresses, domains, URLs, or file hashes).\",
            \"enrichment_type\": \"ip_address\",
            \"Application\": \"Google Threat Intelligence\"
          }
        }",
        "{
          \"Workflow\": {
            \"Playbook\": \"[IP Address Enrichment Cisco Malware Analytics](/content-library/details/global:fusion_playbook:8f66c4b79f834b3195c0b307e0c3eaad)\",
            \"Description\": \"Enriches IP addresses with threat intelligence from Cisco\nMalware Analytics, retrieving geolocation data, ASN information,\nthreat tags, and malware analytics to provide comprehensive context\nfor security investigations. This playbook can be triggered\non-demand from an Next-Gen SIEM Case or integrated into other\nautomated playbooks to perform enrichment when provided a detection\nID and the relevant entity (such as IP addresses, domains, URLs, or\nfile hashes).\",
            \"enrichment_type\": \"ip_address\",
            \"Application\": \"Cisco Malware Analytics\"
          }
        }",
        "{
          \"Workflow\": {
            \"Playbook\": \"[IP Address Enrichment Microsoft Defender for Endpoint](/content-library/details/global:fusion_playbook:934cfabf4bf34a2e8cd1b1aeeb0dcd7a)\",
            \"Description\": \"Enriches IP addresses with threat intelligence data from\nMicrosoft Defender for Endpoint, including organization prevalence,\nfirst seen, and last seen timestamps, then adds the findings as\ncomments and tags to Next-Gen SIEM cases or detections. This\nplaybook can be triggered on-demand from an Next-Gen SIEM Case or\nintegrated into other automated playbooks to perform enrichment when\nprovided a detection ID and the relevant entity (such as IP\naddresses, domains, URLs, or file hashes).\",
            \"enrichment_type\": \"ip_address\",
            \"Application\": \"Microsoft Defender for Endpoint\"
          }
        }",
        "{
          \"Workflow\": {
            \"Playbook\": \"[Vulnerability Enrichment Microsoft Defender for Endpoint](/content-library/details/global:fusion_playbook:9e3d0abe828b4eb19217d22dada004f5)\",
            \"Description\": \"Enriches Next-Gen SIEM cases and detections with vulnerability\ninformation from Microsoft Defender for Endpoint, providing details\non High severity vulnerabilities including Common Vulnerabilities\nand Exposures (CVE) identifiers, Common Vulnerability Scoring\nSystem (CVSS) scores, exploitation status, and affected machines\nfor the specified hostname. This playbook can be triggered on-demand\nfrom an Next-Gen SIEM Case or integrated into other automated\nplaybooks to perform enrichment when provided a detection ID and\nthe relevant entity (such as IP addresses, domains, URLs, or file\nhashes).\",
            \"enrichment_type\": \"vulnerability\",
            \"Application\": \"Microsoft Defender for Endpoint\"
          }
        }",
        "{
          \"Workflow\": {
            \"Playbook\": \"[Hash Enrichment Microsoft Defender for Endpoint](/content-library/details/global:fusion_playbook:53a3baafc7464b6cb27ef9ecf14f8453)\",
            \"Description\": \"Enriches file hash SHA1 identifiers with Microsoft Defender for\nEndpoint data including threat intelligence, file statistics, alert\ndetails, and associated evidence to provide comprehensive context\nfor security investigations. This playbook can be triggered\non-demand from an Next-Gen SIEM Case or integrated into other\nautomated playbooks to perform enrichment when provided a detection\nID and the relevant entity (such as IP addresses, domains, URLs, or\nfile hashes).\",
            \"enrichment_type\": \"hash\",
            \"Application\": \"Microsoft Defender for Endpoint\"
          }
        }"
      ]
      )
      | parseJson(removePrefixes=["Workflow."])

      | case {
        in("enrichment_type", ignoreCase=true, values=["user"]) | type := "User";
        in("enrichment_type", ignoreCase=true, values=["url"]) | type := "URL";
        in("enrichment_type", ignoreCase=true, values=["domain"]) | type := "Domain";
        in("enrichment_type", ignoreCase=true, values=["ip_address"]) | type := "IP_Address";
        in("enrichment_type", ignoreCase=true, values=["vulnerability"]) | type := "Vulnerability";
        in("enrichment_type", ignoreCase=true, values=["hash"]) | type := "Hash";
        *;
      }

      | type = ?Enrichment_Type

      | case {
        in("Application", ignoreCase=true, values=["AbuseIPDB"]) | _app_ := "AbuseIPDB";
        in("Application", ignoreCase=true, values=["Abnormal Security"]) | _app_ := "Abnormal Security";
        in("Application", ignoreCase=true, values=["APIVoid"]) | _app_ := "APIVoid";
        in("Application", ignoreCase=true, values=["AWS IAM"]) | _app_ := "AWS IAM";
        in("Application", ignoreCase=true, values=["Axonius"]) | _app_ := "Axonius";
        in("Application", ignoreCase=true, values=["Cisco Duo"]) | _app_ := "Cisco Duo";
        in("Application", ignoreCase=true, values=["Cisco Malware Analytics"]) | _app_ := "Cisco Malware Analytics";
        in("Application", ignoreCase=true, values=["Cisco Umbrella"]) | _app_ := "Cisco Umbrella";
        in("Application", ignoreCase=true, values=["Cloudflare Email Security"]) | _app_ := "Cloudflare Email Security";
        in("Application", ignoreCase=true, values=["CrowdStrike"]) | _app_ := "CrowdStrike";
        in("Application", ignoreCase=true, values=["Domo Analytics Platform"]) | _app_ := "Domo Analytics Platform";
        in("Application", ignoreCase=true, values=["GitHub"]) | _app_ := "GitHub";
        in("Application", ignoreCase=true, values=["Google Threat Intelligence"]) | _app_ := "Google Threat Intelligence";
        in("Application", ignoreCase=true, values=["HaveIBeenPwned"]) | _app_ := "HaveIBeenPwned";
        in("Application", ignoreCase=true, values=["MaxMind"]) | _app_ := "MaxMind";
        in("Application", ignoreCase=true, values=["Microsoft Defender for Endpoint"]) | _app_ := "Microsoft Defender for Endpoint";
        in("Application", ignoreCase=true, values=["Microsoft Entra ID"]) | _app_ := "Microsoft Entra ID";
        in("Application", ignoreCase=true, values=["Netskope"]) | _app_ := "Netskope";
        in("Application", ignoreCase=true, values=["Okta"]) | _app_ := "Okta";
        in("Application", ignoreCase=true, values=["Oracle IAM"]) | _app_ := "Oracle IAM";
        in("Application", ignoreCase=true, values=["PingOne Identity"]) | _app_ := "PingOne Identity";
        in("Application", ignoreCase=true, values=["Pulsedive"]) | _app_ := "Pulsedive";
        in("Application", ignoreCase=true, values=["SailPoint IdentityIQ"]) | _app_ := "SailPoint IdentityIQ";
        in("Application", ignoreCase=true, values=["SailPoint Identity SC"]) | _app_ := "SailPoint Identity SC";
        in("Application", ignoreCase=true, values=["SecurityTrails"]) | _app_ := "SecurityTrails";
        in("Application", ignoreCase=true, values=["Slack"]) | _app_ := "Slack";
        in("Application", ignoreCase=true, values=["URLScan.io"]) | _app_ := "URLScan.io";
        in("Application", ignoreCase=true, values=["VirusTotal"]) | _app_ := "VirusTotal";
        in("Application", ignoreCase=true, values=["Zscaler"]) | _app_ := "Zscaler";
        in("Application", ignoreCase=true, values=["1Password Kolide"]) | _app_ := "1Password Kolide";
        *;
      }

      | _app_ = ?Application

      | table(["Playbook", "Description"], sortby="Playbook", order=asc)
    end: now
    start: 10m
    width: 8
    options:
      cell-overflow: wrap-text
      column-overflow: wrap-text
      configured-columns:
        Description:
          color: '#126CC6FF'
