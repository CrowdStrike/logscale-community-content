  note-1757104500926-0:
    x: 4
    y: 15
    height: 4
    text: |+
      You can enrich data through the use of [Lookup Files](https://docs.crowdstrike.com/r/rdb0abf5). This allows you to enhance your queries with a table of information to aid in threat hunting or general searching.

      An excellent example of this is the *[falcon/helper/mappings.csv](/investigate/search/lookup-files/falcon%2Fhelper%2Fmappings.csv?repoOrViewName=search-all)* lookup file. This can be used to make the data from your query more easily understood.

      ### [Check out this Cool Query Friday post on our Reddit page to see how this can be used to enrich information in your queries!](https://www.reddit.com/r/crowdstrike/comments/18off35/20231222_cool_query_friday_new_feature_in_raptor/)
      - ⓘ *Lookup files can be viewed, created, and edited in the [Lookup Files page](/investigate/search/lookup-files).*
      - ⓘ *You can query a lookup file using the readFile() function to see what a particular lookup file contains or to include its contents in your search. [Click here to see this function in action with the lookup file referenced above.](/investigate/search?end=&query=readFile\(%22falcon%2Fhelper%2Fmappings.csv%22\)&repo=all&searchViewInteractions=NoXSA&timezone=UTC)*

    width: 4
    title: Enriching queries with Lookup Files
    type: note
