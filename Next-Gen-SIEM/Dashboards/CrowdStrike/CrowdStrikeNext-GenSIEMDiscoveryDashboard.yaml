    text: "#Additional Charlotte AI Information\n**Check out the [Charlotte AI Overview\
      \ documentation](https://docs.crowdstrike.com/r/dab0e12b) to learn about credit\
      \ budgeting and consumption**\n### Monitoring dashboards\n- [Credit Monitoring](/dashboards-v2/dashboard/4B9D0310-61D2-4EF0-8882-5E23C49F01A7?filter=created_at%3A%27Current%20month%27)\n\
      - [Detection Triage](/dashboards-v2/dashboard/7F208909-8907-4F5E-8CAF-EDE8D1985611?filter=created_at%3A%27Last%2030%20days%27)\n\
      \  \n### Fusion SOAR Automation with Charlotte AI\n- **[Watch this YouTube video\
      \ for an example of how Charlotte AI can be used in a workflow to automate investigations\
      \ into things like email](https://www.youtube.com/watch?v=TsNXfzu737s)**\n \
      \ \n### Privacy Considerations\nⓘ *Note that Charlotte AI leverages generative\
      \ artificial intelligence models and its responses to user prompts are generated\
      \ by generative artificial intelligence models. For more info, see [CrowdStrike\
      \ Offerings Subprocessors](https://docs.crowdstrike.com/r/d1f180fb).*"
    width: 7
    title: ''
    type: note
  623d0440-1d3b-4086-9e3e-86742fc5cf8f:
    x: 0
    y: 23
    height: 3
    text: |-
      # Phishing email trigger with Microsoft 365 and Gmail
      The [Phishing email trigger](/content-library/details/global:fusion_trigger:b81848a79ec059252bb688478d411ef4) lets you efficiently respond to user-reported phishing emails connected through the supported email service. This Fusion SOAR trigger allows you to automate and standardize the triage, enrichment, and remediation of potential email attacks. For more info, see the CrowdStrike Store app [Microsoft 365: Email Phishing Plugin](/store-v2/6bab7242d8904358bd04131ec4233020) or the [Gmail Phishing Plugin](/store-v2/98928cc76bba4dbfa1cbe3e2be578da0).

      **See an example of how this can be used with the [Email phishing response](/content-library/details/global:fusion_playbook:e7b386e774a847eba14e866ad3f3c197) playbook.**
    width: 7
    title: ''
    type: note
