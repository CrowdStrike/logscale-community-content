  000ebefe-4bce-4e92-9d98-30fbe8bf93e4:
    x: 0
    y: 39
    description: This is not an exhaustive list of all dashboards available for external
      data sources due to CrowdStrike and our partners developing new dashboards regularly.
      You can view all available dashboards using the link in the red widget above,
      or import or develop your own using the information in the DIY note below.
    height: 8
    queryString: |-
      // Last updated: 2026-04-20

      | createEvents(
      [
        "{
          \"Dashboard\": {
            \"Dashboard Name\": \"[AWS - CloudTrail - Overview](/investigate/search/custom-dashboards/AWS%20-%20CloudTrail%20-%20Overview?repoOrViewName=search-all&packageScope=falcon/ngsiem-content)\",
            \"Data Source / Data Connector\": \"AWS CloudTrail\n\nData is ingested through any of the following:\n-   CrowdStrike's Cloud Security module\n-   The \\\"AWS CloudTrail\\\" connector for Next-Gen SIEM\n-   Generic data ingestion to CrowdStrike using the aws-cloudtrail parser\",
            \"Descriptions and Additional Notes\": \"This dashboard provides visibility into AWS CloudTrail data and Falcon Cloud\nSecurity IOAs. Key features include:\n-   User activity monitoring including login attempts and failures by region\n-   Console activities and mutating actions tracking\n-   Root user and AWS Organizations activity monitoring\n-   SSO activity analysis\n-   Visualizations for console login attempts, top login failures, and IAM\n    user MFA change attempts\",
            \"#Vendor.dash\": \"aws\",
            \"#event.module.dash\": \"cloudtrail\"
          }
        }",
        "{
          \"Dashboard\": {
            \"Dashboard Name\": \"[AWS - CloudTrail - S3 Activities](/investigate/search/custom-dashboards/AWS%20-%20CloudTrail%20-%20S3%20Activities?repoOrViewName=search-all&packageScope=falcon/ngsiem-content)\",
            \"Data Source / Data Connector\": \"AWS CloudTrail\n\nData is ingested through any of the following:\n-   CrowdStrike's Cloud Security module\n-   The \\\"AWS CloudTrail\\\" connector for Next-Gen SIEM\n-   Generic data ingestion to CrowdStrike using the aws-cloudtrail parser\",
            \"Descriptions and Additional Notes\": \"This dashboard provides comprehensive monitoring of AWS S3 activities, helping\nyou quickly identify suspicious behavior. Use this dashboard for bucket access\nanalysis, geographic source tracking, user activity monitoring, and encryption\nstatus visibility across S3 resources.\",
            \"#Vendor.dash\": \"aws\",
            \"#event.module.dash\": \"cloudtrail\"
          }
        }",
        "{
          \"Dashboard\": {
            \"Dashboard Name\": \"[AWS - VPC Flow Logs - Overview](/investigate/search/custom-dashboards/AWS%20-%20VPC%20Flow%20Logs%20-%20Overview?repoOrViewName=search-all&packageScope=falcon/ngsiem-content)\",
            \"Data Source / Data Connector\": \"Amazon Virtual Private Cloud\n\nData is ingested through any of the following:\n-   The \\\"Amazon Virtual Private Cloud\\\" connector for Next-Gen SIEM\n-   Generic data ingestion to CrowdStrike using the aws-vpcflow parser\",
            \"Descriptions and Additional Notes\": \"This dashboard offers real-time visibility into AWS VPC network traffic patterns.\nUse this dashboard for geographical traffic analysis, autonomous system mapping,\nthreat intelligence correlation, port usage monitoring, and detailed network\nflow analysis.\",
            \"#Vendor.dash\": \"aws\",
            \"#event.module.dash\": \"vpcflow\"
          }
        }",
        "{
          \"Dashboard\": {
            \"Dashboard Name\": \"[Corelight name resolution insights](/investigate/search/custom-dashboards/Corelight%20name%20resolution%20insights?repoOrViewName=search-all&packageScope=falcon/ngsiem)\",
            \"Data Source / Data Connector\": \"Corelight NDR\",
            \"Descriptions and Additional Notes\": \"Partner-developed dashboard\",
            \"#Vendor.dash\": \"corelight\",
            \"#event.module.dash\": \"ndr\"
          }
        }",
