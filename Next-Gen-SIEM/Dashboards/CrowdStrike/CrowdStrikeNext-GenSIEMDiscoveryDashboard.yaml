  a182a8f0-cd8e-4e16-a34c-a72124b78421:
    x: 8
    y: 9
    height: 4
    queryString: |-
      createEvents([
       "example=1st_item exampleEvent=1",
       "example=1st_item exampleEvent=1",
       "example=1st_item exampleEvent=1",
       "example=2nd_item exampleEvent=1",
       "example=2nd_item exampleEvent=1",
       "example=3rd_item exampleEvent=1",
       "example=1st_item exampleEvent=2",
       "example=1st_item exampleEvent=2",
       "example=2nd_item exampleEvent=2",
       "example=3rd_item exampleEvent=2",
       "example=3rd_item exampleEvent=2",
       "example=3rd_item exampleEvent=2",
       "example=1st_item exampleEvent=3",
       "example=2nd_item exampleEvent=3",
       "example=2nd_item exampleEvent=3",
       "example=2nd_item exampleEvent=3",
       "example=3rd_item exampleEvent=3",
       "example=3rd_item exampleEvent=3"
      ])
      | kvParse()
      | case {
          exampleEvent = 1 |
          now(as=current_timestamp)
          | new_timestamp := current_timestamp;
          exampleEvent = 2 |
          now(as=current_timestamp)
          | new_timestamp := current_timestamp - 300000;
          exampleEvent = 3 |
          now(as=current_timestamp)
          | new_timestamp := current_timestamp - 600000;
          *;
      }

      | case {
          example = 2nd_item exampleEvent = 3 |
          new_timestamp := new_timestamp + 100000;

          example = 2nd_item  exampleEvent = /1|2/ |
          new_timestamp := new_timestamp - 200000;

          example = 3rd_item exampleEvent = 3 |
          new_timestamp := new_timestamp + 250000;

          example = 3rd_item  exampleEvent = /1|2/ |
          new_timestamp := new_timestamp - 150000;
          *;
      }
      | @timestamp := new_timestamp
      | timeChart(span=2min, series=example, function=count())
    end: now
    start: 10m
    width: 4
    options:
      series:
        1st_item:
          color:
            dark: '#8280FF'
            light: '#1C3CAE'
        2nd_item:
          color:
            dark: '#4CD7F5'
            light: '#0F99A1'
        3rd_item:
          color:
            dark: '#FD74CD'
            light: '#990072'
      valueFormatX: abbreviated
      xAxisTitle: Time
      legend: false
      yAxisTitle: Count
      polyOrder: 2
      xScaleType: linear
      titleSize: medium
      yZero: false
      xZero: false
      withXAxisTitle: false
      regression: true
      withYAxisTitle: true
      regressionType: poly
    visualization: scatter-chart
    title: Scatter Chart Example (with Trend)
    isLive: false
    type: query
