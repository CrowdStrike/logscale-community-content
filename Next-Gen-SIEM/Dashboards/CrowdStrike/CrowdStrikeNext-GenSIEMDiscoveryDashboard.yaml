  cebfe7f6-2714-422c-bb35-568d587fdaa9:
    x: 8
    y: 11
    description: This shows an example of using the groupBy() function to group together
      events by the same ComputerName.
    height: 4
    queryString: |-
      createEvents(["ComputerName=Acme_Inc_DC dns_request='google[.]com'",
      "ComputerName=Acme_Inc_DC dns_request='bing[.]com'",
      "ComputerName=Acme_Inc_DC dns_request='facebook[.]com'",
      "ComputerName=Acme_Inc_DC dns_request='crowdstrike[.]com'",
      "ComputerName=Acme_Inc_ep-1 dns_request='facebook[.]com'",
      "ComputerName=Acme_Inc_ep-1 dns_request='reddit[.]com'",
      "ComputerName=Acme_Inc_ep-1 dns_request='google[.]com'",
      "ComputerName=Acme_Inc_ep-1 dns_request='crowdstrike[.]com'",
      "ComputerName=Acme_Inc_ep-1 dns_request='netflix[.]com'",
      "ComputerName=Acme_Inc_ep-1 dns_request='myspace[.]com'",
      "ComputerName=Acme_Inc_ep-2 dns_request='totally-not-a-phishing-site[.]com'"])
      | kvParse()
      | groupBy([ComputerName], function=collect(dns_request))
    end: now
    start: 1d
    width: 4
    options:
      cell-overflow: wrap-text
      column-overflow: truncate
      configured-columns:
        ComputerName:
          width: 150
      row-numbers-enabled: false
    visualization: table-view
    title: groupBy() Example
    isLive: false
    type: query
