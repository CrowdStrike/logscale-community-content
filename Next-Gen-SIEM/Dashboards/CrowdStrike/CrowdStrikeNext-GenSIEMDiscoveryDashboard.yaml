    text: |-
      # Python scripting within Fusion
      ### Use the "[Create a Python script](/content-library/details/global:fusion_action:7fb9eb10b23943efaf1e6082b0ac0338)" action within your workflow

      ### Common use cases:
      - **Advanced data manipulation**: Perform complex calculations, parse data structures, or process large datasets using Python libraries.
      - **Complex logic and data processing**: Automate multi-step logic and intricate data relationships that are difficult or impossible to replicate with standard workflow actions or Common Expression Language (CEL).

      ### Supported Python packages
      The following packages are pre-installed and available for use in your Python scripts:
      - [networkx](https://pypi.org/project/networkx/) ~= 3.6.1
      - [numpy](https://pypi.org/project/numpy/) ~= 2.4.4
      - [pandas](https://pypi.org/project/pandas/) ~= 3.0.2
      - [pydantic](https://pypi.org/project/pydantic/) ~= 2.12.5
      - [pytz](https://pypi.org/project/pytz/) ~= 2026.1

      ### Important limitations and considerations:
      - This feature is available in Fusion SOAR workflows only and is not supported in Foundry Workflow templates.
      - Only pre-installed Python packages are available for use. Additional packages cannot be added.
      - Consider using the workflow Test feature to validate your function before enabling the workflow. For more info, see Test and debug your workflows.
      - Consider reviewing your script for potential infinite loops before enabling the workflow.
      - Avoid issuing network requests to endpoints that require authentication. Embedding credentials directly in your script to access external resources is not recommended and can pose a security risk.
      - This action does not support file-based input or output. Any data passed to or returned from the script must be in text format.
      - This action has a payload size limitation. The combined size of input and output data cannot exceed 256 KB. Scripts or outputs that exceed these limits will fail to execute.

      ### See more about this in our [documentation](https://docs.crowdstrike.com/r/lca61cb1) and [release notes](/support/release-notes/release-notes-create-python-scripts-within-falcon-fusion-soar-workflows)
    width: 5
    title: ' '
    type: note
