  188d5644-1d59-4771-bff9-a5504a083ff8:
    x: 2
    y: 26
    height: 5
    text: "## Federated Search\n- Federated Search enables you to search not only\
      \ across Next-Gen SIEM data, but also external data sources.\n- You can query,\
      \ analyze, and perform joins across external sources such as Amazon Athena,\
      \ using the CrowdStrike Amazon Athena Connector.\n- This gives Security Operations\
      \ Center (SOC) analysts ad-hoc access to these external datasets for investigations,\
      \ threat hunting, or correlation with existing data in Next-Gen SIEM.\n  \nⓘ\
      \ *The use of this feature does not require any additional licensing. Data returned\
      \ from a query using [remoteTable()](https://docs.crowdstrike.com/r/a4f49b050)\
      \ function counts against your licensed daily ingestion amount for Next-Gen\
      \ SIEM.*\n  \n### [Check out our Documentation to learn more about how to setup\
      \ and use this feature](https://docs.crowdstrike.com/r/c95b29b3)"
    width: 5
    title: ' '
    type: note
