  note-1756233800352-1:
    x: 0
    y: 3
    height: 7
    text: "### CrowdStrike Documentation:\n\n- [Set up Falcon Next-Gen SIEM](https://docs.crowdstrike.com/r/cffa5af8)\
      \ (A high-level strategy to getting Next-Gen SIEM up and running with your data\
      \ and security needs)\n- [Data Connectors](https://docs.crowdstrike.com/r/a76b8289)\
      \ (General information on CrowdStrike's data connectors)\n- [Third-party Data\
      \ Sources](https://docs.crowdstrike.com/r/je6a45b3) (Index on the left links\
      \ to documentation for setting up ingestion for third-party solutions)  \n-\
      \ ⓘ *Pull connectors generally use an API to configure the data connector to\
      \ \"pull\" the data into CrowdStrike. Push connectors generally use the LogScale\
      \ collector to \"push\" the logs to the CrowdStrike cloud.*\n- [LogScale Collector](https://docs.crowdstrike.com/r/a2a653c67)\
      \ (Thorough information on installing, configuring, troubleshooting, and more)\n\
      - [Sensor-managed LogScale Collector Installation](https://docs.crowdstrike.com/r/c43143c9)\
      \ (Automate installation of the Falcon LogScale Collector across hosts in a\
      \ host group with the Falcon sensor using a LogScale Collector policy.)\n- [Get\
      \ Started with Fleet Management](https://docs.crowdstrike.com/r/q81f4f3a)  \n\
      - ⓘ *[Click here to watch an introduction video to Fleet Management on our Tech\
      \ Hub](https://vid.crowdstrike.com/watch/cKxirC9L9pe9uHWqWLtKP4?)*\n- [Integrate\
      \ with Falcon Onum](https://docs.crowdstrike.com/r/uvjbk67m) (This guide explains\
      \ how to send data from Falcon Onum to Next-Gen SIEM.)\n\n\n### Support Portal\n\
      \n- [[Index] Next-Gen SIEM Data Connector troubleshooting articles](https://supportportal.crowdstrike.com/s/article/ka1Ns0000001mU1IAI)\
      \ (Troubleshooting information for using the Falcon LogScale Collector (FLC),\
      \ 3rd-party data connectors, and HTTP/HEC data connectors)\n- [Troubleshooting\
      \ Sensor-managed Falcon LogScale Collector Installations](https://supportportal.crowdstrike.com/s/article/Troubleshooting-Sensor-managed-Falcon-LogScale-Collector-Installations)\
      \ (Troubleshooting information for when the LogScale collector is managed through\
      \ the LogScale Collector Policies for the Falcon Sensor)\n- [How To Create an\
      \ Effective Support Ticket for Next-Gen SIEM](https://supportportal.crowdstrike.com/s/article/ka1Ns0000005fc1IAA)\
      \ (This will help you effectively request assistance from our Support team when\
      \ creating a ticket for Next-Gen SIEM)\n\n### LogScale documentation\n\nIf needed,\
      \ there is a lot of crossover of understanding and use cases for things like\
      \ the LogScale Collector, which is used with many third-party solutions when\
      \ sending their logs to CrowdStrike.\n- [Configuration file examples](https://library.humio.com/falcon-logscale-collector/log-collector-config-advanced-example.html)\n\
      - [Install Falcon LogScale Collector](https://library.humio.com/falcon-logscale-collector/log-collector-install.html)\
      \ (Information similar to what is in the CrowdStrike console for this, but there\
      \ may be small nuances that can help here that may not be in the console documentation)\n\
      - ⓘ ***Custom Install** method is the manual process of installing the log collector\
      \ and managing its configuration directly on the host. **Full Install** method\
      \ is the process of using Fleet Management to manage the configuration and version\
      \ of the log collector from the CrowdStrike console. Please refer to the CrowdStrike\
      \ console documentation if you wish to use this method.*"
    width: 8
    title: Documentation to help you get started using Next-Gen SIEM
    type: note
